<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="100%" height="100%">
  <defs>
    <!-- Premium metallic gold gradient -->
    <linearGradient id="gold-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#9C721B" />
      <stop offset="40%" stop-color="#E6C665" />
      <stop offset="70%" stop-color="#F3E092" />
      <stop offset="100%" stop-color="#A37A20" />
    </linearGradient>
  </defs>

  <!-- Logo Icon Part -->
  <g transform="translate(10, 0)">
    <!-- 4-pointed Star -->
    <path d="M 132 4 Q 132 16 144 16 Q 132 16 132 28 Q 132 16 120 16 Q 132 16 132 4 Z" fill="url(#gold-grad)" />

    <!-- Human Figure Head -->
    <circle cx="70" cy="36" r="15" fill="#0F3260" />

    <!-- Human Figure Body -->
    <path d="M 120 24 C 112 36 92 48 64 52 C 58 53 58 53 58 54 C 42 66 26 82 14 100 C 28 100 48 105 64 118 C 68 128 64 142 52 152 C 70 145 90 120 102 92 C 108 78 114 50 120 24 Z" fill="#0F3260" />

    <!-- Gold Gradient Bar Chart with Slanted Tops -->
    <!-- Bar 1 (Left) -->
    <path d="M 65 160 L 65 150 C 65 147 67 145 71 144 L 77 142 L 77 160 Z" fill="url(#gold-grad)" />

    <!-- Bar 2 (Middle) -->
    <path d="M 83 160 L 83 124 C 83 120 85 117 89 116 L 95 112 L 95 160 Z" fill="url(#gold-grad)" />

    <!-- Bar 3 (Right) -->
    <path d="M 101 160 L 101 92 C 101 87 103 83 107 81 L 113 78 L 113 160 Z" fill="url(#gold-grad)" />
  </g>

  <!-- Typography: HASH CAREER -->
  <text x="180" y="122" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="800" letter-spacing="1">
    <tspan fill="url(#gold-grad)">HASH</tspan>
    <tspan dx="15" fill="#0F3260">CAREER</tspan>
  </text>
</svg>
